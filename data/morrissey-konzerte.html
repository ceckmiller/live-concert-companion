<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f12">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Morrissey — Konzerte & Setlists</title>
<style>
:root{--bg:#0c0c0f;--surface:#16161c;--surface2:#212128;--surface3:#2a2a33;--text:#f2ede6;--muted:#a8a196;--accent:#d4ad2a;--accent-soft:rgba(212,173,42,.12);--border:#3a3a45;--highlight:#2e2618;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);--poster-w:9.5rem}
*{box-sizing:border-box;-webkit-tap-highlight-color:rgba(212,173,42,.18)}
html{-webkit-text-size-adjust:100%;font-size:17px}
body{margin:0;font-family:Georgia,"Iowan Old Style",Palatino,serif;background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:var(--safe-bottom)}
a{color:var(--accent)}
header{padding:calc(1.35rem + var(--safe-top)) 1.1rem 1.35rem;padding-left:calc(1.1rem + var(--safe-left));padding-right:calc(1.1rem + var(--safe-right));border-bottom:1px solid var(--border);background:linear-gradient(165deg,#1c1624 0%,var(--bg) 70%)}
header h1{margin:0 0 .45rem;font-size:1.85rem;font-weight:400;line-height:1.15;letter-spacing:.01em}
header p{margin:0;color:var(--muted);font-size:1rem;line-height:1.5}
.standalone{margin-top:.75rem;padding:.65rem .8rem;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);font-size:.88rem;line-height:1.45;border-radius:0 4px 4px 0}
nav{position:sticky;top:0;z-index:10;display:flex;gap:0;background:rgba(12,12,15,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding-left:var(--safe-left);padding-right:var(--safe-right)}
nav a{flex:1;text-align:center;text-decoration:none;font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:.95rem .5rem;border-bottom:3px solid transparent;font-weight:400}
nav a:active,nav a:hover{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-soft)}
main{max-width:980px;margin:0 auto;padding:1.1rem;padding-left:calc(1.1rem + var(--safe-left));padding-right:calc(1.1rem + var(--safe-right))}
section{margin-bottom:2.75rem}
.section-head{border-bottom:1px solid var(--border);padding-bottom:.85rem;margin-bottom:1.15rem}
h2{font-size:1.35rem;font-weight:400;margin:0 0 .35rem;letter-spacing:.03em;color:var(--text)}
.section-desc{color:var(--muted);margin:0;font-size:.95rem;line-height:1.5}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.5rem}
.stat{background:var(--surface);border:1px solid var(--border);padding:.9rem 1rem;border-radius:6px;border-top:2px solid var(--accent)}
.stat .val{font-size:1.65rem;color:var(--accent);line-height:1;font-weight:400}
.stat .lbl{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:.3rem}
.timeline{position:relative}
.year-marker{display:flex;align-items:center;gap:.85rem;margin:2rem 0 1rem;color:var(--accent);font-size:1.1rem;letter-spacing:.02em;font-weight:400;line-height:1.35}
.year-marker span{background:var(--bg);padding:0 .65rem}
.year-marker::before,.year-marker::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border),var(--accent),var(--border),transparent)}
.concert-wrap{margin-bottom:.9rem;scroll-margin-top:3.75rem}
.concert-wrap.highlight .concert{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 4px 20px rgba(0,0,0,.35)}
.concert{border:1px solid var(--border);background:var(--surface);overflow:hidden;border-radius:8px;transition:border-color .25s,box-shadow .25s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.concert summary{cursor:pointer;padding:0;list-style:none;display:grid;grid-template-columns:var(--poster-w) 1fr 3.25rem;grid-template-areas:"poster head toggle";align-items:stretch;min-height:12.5rem}
.concert summary::-webkit-details-marker{display:none}
.concert-poster{grid-area:poster;width:var(--poster-w);background:var(--surface2);border-right:1px solid var(--border);overflow:hidden;align-self:stretch}
.concert-poster img{width:100%;height:100%;object-fit:cover;display:block;min-height:12.5rem;aspect-ratio:3/4}
.concert-head{grid-area:head;padding:1rem .95rem;display:flex;flex-direction:column;justify-content:center;gap:.45rem;min-width:0}
.concert-title{font-size:1.1rem;line-height:1.35;font-weight:400;color:var(--text)}
.concert-meta{display:flex;flex-wrap:wrap;gap:.4rem}
.concert-toggle{grid-area:toggle;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:1.65rem;min-width:3.25rem;border-left:1px solid var(--border);align-self:stretch;background:var(--surface2)}
.concert[open] .concert-toggle::after{content:"−"}
.concert:not([open]) .concert-toggle::after{content:"+"}
.concert[open] .concert-toggle{background:var(--accent-soft)}
.poster-caption{font-size:.78rem;color:var(--muted);line-height:1.4;padding-top:.15rem;border-top:1px solid var(--border);margin-top:.1rem}
.badge{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;padding:.22rem .5rem;border:1px solid var(--border);color:var(--muted);border-radius:3px;background:var(--surface2)}
.badge.tour{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}.badge.city{border-color:var(--border);color:var(--text)}.badge.poster-real{border-color:#5a9a6a;color:#9ee0b0;background:rgba(90,154,106,.1)}.badge.poster-album{border-color:#7a6535;color:var(--accent);background:var(--accent-soft)}.badge.poster-promo{border-color:#5a8aaa;color:#a8d4f0;background:rgba(90,138,170,.1)}
.concert-body{padding:1rem .95rem 1.1rem;border-top:1px solid var(--border);background:linear-gradient(180deg,var(--surface) 0%,#131318 100%)}
.body-label{font-size:.78rem;font-weight:400;margin:0 0 .55rem;color:var(--accent);text-transform:uppercase;letter-spacing:.1em}
.body-label-meta{color:var(--muted);font-size:.72rem;letter-spacing:.04em;text-transform:none}
.concert-note{color:var(--muted);font-size:.95rem;margin:0 0 1rem;font-style:italic;line-height:1.5;padding:.65rem .75rem;background:var(--surface2);border-radius:4px;border-left:3px solid var(--border)}
.setlist-block{margin-bottom:1rem}
.setlist{margin:0;padding-left:1.25rem;font-size:1.02rem;line-height:1.65}
.setlist li{margin-bottom:.4rem;padding-right:.25rem}
.setlist li::marker{color:var(--accent);font-size:.9em}
.setlist a{text-decoration:underline;text-underline-offset:3px;display:inline-block;padding:.12rem 0}
.setlist a:active{color:#f0d060}
.song-line{display:block}
.song-title{font-weight:inherit}
.song-meta{display:block;font-size:.78rem;color:var(--muted);line-height:1.4;margin-top:.12rem;font-weight:400}
.song-meta.song-origin-smiths{color:#9eb8d4}
.song-meta.song-origin-cover{color:#c9a87a}
.songs-table .song-meta{margin-top:.2rem}
.song-official-link{color:inherit;text-decoration:none;display:inline-block}
.song-official-link .song-title{text-decoration:underline;text-underline-offset:3px}
.song-official-link:active .song-title,.song-official-link:hover .song-title{color:var(--accent)}
.concert-reviews{margin-bottom:1.1rem}
.review-links{display:flex;flex-direction:column;gap:.45rem}
.review-link{font-size:.92rem;text-decoration:none;padding:.55rem .7rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;line-height:1.4;display:block;color:var(--text)}
.review-link:active,.review-link:hover{background:var(--highlight);border-color:var(--accent)}
.review-source{color:var(--muted);font-size:.82rem;display:block;margin-top:.15rem}
.concert-recordings{margin-top:.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.recordings-title{font-size:.78rem;font-weight:400;margin:0 0 .6rem;color:var(--accent);text-transform:uppercase;letter-spacing:.1em}
.concert-recordings ul{margin:0;padding:0;list-style:none;font-size:.95rem}
.concert-recordings li{margin:.5rem 0;padding:.6rem .7rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;line-height:1.45}
.concert-recordings li::before{content:"▶ ";color:var(--accent);font-size:.75rem}
.concert-recordings a{text-decoration:underline;text-underline-offset:3px}
.video-duration{color:var(--muted);font-size:.85rem}
.concert-spotify{margin-bottom:1.1rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.spotify-actions{display:flex;flex-direction:column;gap:.45rem}
.spotify-btn{font-size:.92rem;text-decoration:none;padding:.55rem .7rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;line-height:1.4;display:block;color:var(--text);text-align:left;cursor:pointer;font-family:inherit}
.spotify-btn:active,.spotify-btn:hover{background:var(--highlight);border-color:#1db954}
.spotify-btn-primary{border-color:#1db954;color:#1ed760}
.spotify-hint{font-size:.82rem;color:var(--muted);margin:.45rem 0 0;line-height:1.4}
.songs-table{width:100%;border-collapse:collapse;font-size:.95rem}
.songs-table th,.songs-table td{padding:.6rem .45rem;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}
.songs-table th{color:var(--muted);font-weight:400;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em}
.songs-table .num{text-align:center;width:2rem;color:var(--muted);padding-left:0;font-size:.88rem}
.songs-table .cnt{text-align:center;width:2.25rem;color:var(--accent);font-weight:500;font-size:1rem}
.songs-table .bar-cell{display:none}
.song-row{cursor:pointer}
.song-row:active td,.song-row.open td{background:var(--highlight)}
.song-name{font-weight:500;line-height:1.4;font-size:1rem}
.song-hint{font-size:.78rem;color:var(--muted);display:block;margin-top:.15rem}
.song-detail td{padding:0;background:var(--surface2)}
.song-detail[hidden]{display:none}
.song-appearances{margin:0;padding:.65rem .75rem .75rem 1.15rem;font-size:.92rem;list-style:none}
.song-appearances li{margin:.45rem 0;padding:.4rem 0;border-bottom:1px solid var(--border)}
.song-appearances li:last-child{border-bottom:none}
.concert-link{background:none;border:none;padding:.25rem 0;color:var(--accent);cursor:pointer;font:inherit;text-decoration:underline;text-align:left;line-height:1.45;min-height:2.75rem;display:inline-block;font-size:.95rem}
.bar{height:7px;background:linear-gradient(90deg,var(--accent),#e8c04a);border-radius:2px}
.chart-row{display:grid;grid-template-columns:minmax(0,1fr) 2rem;grid-template-areas:"label count" "bar bar";gap:.4rem .55rem;align-items:center;margin-bottom:.65rem;font-size:.95rem;padding:.35rem 0}
.chart-label{grid-area:label;cursor:pointer;line-height:1.4;padding:.1rem 0}
.chart-label:active{color:var(--accent)}
.chart-bar-wrap{grid-area:bar;height:7px;background:var(--surface3);border-radius:2px}
.chart-bar{height:100%;background:linear-gradient(90deg,var(--accent),#e0b830);border-radius:2px}
.chart-count{grid-area:count;text-align:right;color:var(--accent);font-size:.88rem;font-weight:500}
#top-chart{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:1.25rem}
footer{padding:1.35rem 1.1rem calc(1.35rem + var(--safe-bottom));border-top:1px solid var(--border);color:var(--muted);font-size:.85rem;text-align:center;line-height:1.5}
@media(min-width:480px){:root{--poster-w:10.5rem}}
@media(min-width:640px){
  html{font-size:18px}
  header{padding:2rem 1.75rem 1.85rem}
  header h1{font-size:2.2rem}
  header p,.standalone{font-size:1rem;max-width:70ch}
  nav{gap:2rem;padding:.85rem 1.75rem;justify-content:flex-start}
  nav a{flex:none;padding:0;border-bottom:none;font-size:.85rem}
  main{padding:1.75rem}
  h2{font-size:1.5rem}
  .section-desc{font-size:1rem}
  .stats{grid-template-columns:repeat(4,1fr);gap:1rem}
  .stat{padding:1.1rem 1.2rem}
  .stat .val{font-size:1.85rem}
  .concert summary{min-height:14rem}
  .concert-poster img{min-height:14rem}
  .concert-head{padding:1.15rem 1.2rem}
  .concert-title{font-size:1.15rem}
  .year-marker{font-size:1.15rem;margin:2.25rem 0 1.1rem}
  .review-links{flex-direction:row;flex-wrap:wrap}
  .review-link{flex:1 1 calc(50% - .45rem);min-width:14rem}
  .setlist{columns:2;column-gap:2rem}
  .setlist li{break-inside:avoid}
  .songs-table{font-size:1rem}
  .songs-table th,.songs-table td{padding:.55rem .7rem}
  .songs-table .num{text-align:right;width:2.75rem}
  .songs-table .cnt{width:3.25rem}
  .songs-table .bar-cell{display:table-cell;width:26%}
  .song-hint{display:inline;margin-left:.35rem}
  .song-appearances{padding:.65rem .85rem .85rem 2.25rem;list-style:disc}
  .song-appearances li{border-bottom:none;padding:0}
  .chart-row{font-size:1rem;margin-bottom:.55rem}
  .chart-bar-wrap{height:8px}
}
@media(min-width:900px){
  :root{--poster-w:12.5rem}
  header{padding:2.75rem 2rem 2.25rem}
  header h1{font-size:2.5rem}
  nav{padding:.85rem 2rem}
  main{padding:2rem}
  .concert summary{min-height:16.5rem}
  .concert-poster img{min-height:16.5rem}
  .concert-body{padding:1.15rem 1.35rem 1.25rem}
  .concert-head{padding:1.2rem 1.35rem}
  .concert-toggle{font-size:1.75rem;min-width:3.5rem}
}
</style>
</head>

const ORIGIN_LABEL = {morrissey:"Morrissey",smiths:"The Smiths",cover:"Cover"};
function renderSongMeta(song){
  const m = SONG_META[song];
  if (!m) return "";
  let text = ORIGIN_LABEL[m.origin] || m.origin;
  if (m.origin === "cover" && m.by) text += " ("+m.by+")";
  if (m.album) text += " · "+m.album+(m.year ? " ("+m.year+")" : "");
  return '<span class="song-meta song-origin-'+m.origin+'">'+esc(text)+'</span>';
}
function renderSongLabel(song){
  const meta = renderSongMeta(song);
  if (!meta) return esc(song);
  return '<span class="song-line"><span class="song-title">'+esc(song)+'</span>'+meta+'</span>';
}
function renderSongListName(song){
  const inner = renderSongLabel(song);
  const url = OFFICIAL_VIDEOS[song];
  if (!url) return inner;
  return '<a class="song-official-link" href="'+esc(url)+'" target="_blank" rel="noopener noreferrer" title="Offizielles Video auf YouTube">'+inner+'</a>';
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function posterInfo(c){
  const t = DATA.tours[c.tour] || {};
  return {
    poster: c.poster || t.poster || "",
    label: c.posterLabel || t.label || c.tour,
    kind: c.poster ? "promo" : (t.kind || "album")
  };
}
function renderReviews(reviews){
  if (!reviews || !reviews.length) return "";
  return '<div class="concert-reviews"><h3 class="body-label">Kritiken</h3><div class="review-links">'+reviews.map(r=>'<a class="review-link" href="'+esc(r.url)+'" target="_blank" rel="noopener noreferrer">'+esc(r.title)+'<span class="review-source">'+esc(r.source)+'</span></a>').join("")+'</div></div>';
}
function renderRecordings(recordings){
  if (!recordings || !recordings.length) return "";
  return '<div class="concert-recordings"><h3 class="recordings-title">Längere Mitschnitte</h3><ul>'+recordings.map(r=>'<li><a href="'+esc(r.url)+'" target="_blank" rel="noopener noreferrer">'+esc(r.title)+'</a> <span class="video-duration">('+esc(r.duration)+')</span></li>').join("")+'</ul></div>';
}
function renderSpotify(setlistFm){
  if (!setlistFm) return "";
  return '<div class="concert-spotify"><h3 class="body-label">Spotify-Playlist</h3><div class="spotify-actions">'+
    '<button type="button" class="spotify-btn spotify-btn-primary spotify-import" data-setlist-url="'+esc(setlistFm)+'">Setlist importieren</button>'+
    '<a class="spotify-btn" href="'+esc(setlistFm)+'" target="_blank" rel="noopener noreferrer">setlist.fm öffnen</a>'+
    '</div><p class="spotify-hint">Kopiert die setlist.fm-URL und öffnet das Import-Tool — dort einfügen und Playlist erstellen.</p></div>';
}
function renderSetlistItem(song, url){
  const inner = renderSongLabel(song);
  if (url) return '<li data-song="'+esc(song)+'"><a href="'+esc(url)+'" target="_blank" rel="noopener noreferrer" title="YouTube: '+esc(song)+'">'+inner+'</a></li>';
  return '<li data-song="'+esc(song)+'">'+inner+'</li>';
}
function renderConcert(c){
  const p = posterInfo(c);
  const vids = c.videos || {};
  const setlist = c.setlist.map((s)=>renderSetlistItem(s, vids[s])).join("");
  const note = c.note ? '<p class="concert-note">'+esc(c.note)+'</p>' : '';
  const kindBadge = p.kind === "poster" ? '<span class="badge poster-real">Tourplakat</span>' : p.kind === "promo" ? '<span class="badge poster-promo">Festival</span>' : '<span class="badge poster-album">Albumcover</span>';
  return '<div class="concert-wrap" id="concert-'+esc(c.id)+'"><details class="concert" data-id="'+esc(c.id)+'"><summary>'+
    '<div class="concert-poster"><img src="'+esc(p.poster)+'" alt="'+esc(c.tour)+'" title="'+esc(p.label)+'"></div>'+
    '<div class="concert-head">'+
      '<span class="concert-title">'+esc(c.date)+' — '+esc(c.venue)+'</span>'+
      '<div class="concert-meta">'+
        '<span class="badge city">'+esc(c.city)+'</span>'+
        '<span class="badge tour">'+esc(c.tour)+'</span>'+
        kindBadge+
        '<span class="badge">'+c.setlist.length+' Songs</span>'+
      '</div>'+
      '<span class="poster-caption">'+esc(p.label)+'</span>'+
    '</div>'+
    '<span class="concert-toggle"></span>'+
    '</summary><div class="concert-body">'+note+renderReviews(c.reviews)+
    '<div class="setlist-block"><h3 class="body-label">Setlist <span class="body-label-meta">'+c.setlist.length+' Songs</span></h3><ol class="setlist">'+setlist+'</ol></div>'+
    renderSpotify(c.setlistFm)+renderRecordings(c.recordings)+'</div></details></div>';
}
function renderTimeline(concerts){
  let html = "", lastYear = "";
  for (const c of concerts) {
    const year = c.sort.slice(0,4);
    if (year !== lastYear) { html += '<div class="year-marker"><span>'+year+'</span></div>'; lastYear = year; }
    html += renderConcert(c);
  }
  return html;
}
function renderAppearances(list){
  return '<ul class="song-appearances">'+list.map(a =>
    '<li><button type="button" class="concert-link" data-concert="'+esc(a.id)+'">'+esc(a.date)+' — '+esc(a.city)+', '+esc(a.venue)+'</button> <span class="song-hint">(Song Nr. '+a.pos+')</span></li>'
  ).join('')+'</ul>';
}
function openConcert(id){
  const wrap = document.getElementById('concert-'+id);
  const details = wrap && wrap.querySelector('details');
  if (!details) return;
  details.open = true;
  wrap.scrollIntoView({behavior:'smooth',block:'start'});
  wrap.classList.add('highlight');
  setTimeout(()=>wrap.classList.remove('highlight'), 2200);
}
function toggleSongRow(song){
  const row = document.querySelector('tr.song-row[data-song="'+CSS.escape(song)+'"]');
  const detail = row && row.nextElementSibling;
  if (!row || !detail) return;
  const open = !row.classList.contains('open');
  document.querySelectorAll('.song-row.open').forEach(r=>{ r.classList.remove('open'); const d=r.nextElementSibling; if(d) d.hidden=true; });
  if (open) { row.classList.add('open'); detail.hidden=false; }
}
const once = DATA.songs.filter(s=>s.count===1).length;
const berlin = DATA.concerts.filter(c=>c.city==="Berlin").length;
document.getElementById('stats').innerHTML = [
  ['Konzerte', DATA.concerts.length], ['Berlin', berlin], ['Songs', DATA.songs.length], ['Nur 1×', once]
].map(([l,v])=>'<div class="stat"><div class="val">'+v+'</div><div class="lbl">'+l+'</div></div>').join('');
document.getElementById('concert-list').innerHTML = renderTimeline(DATA.concerts);
document.getElementById('concert-list').addEventListener('click', e=>{
  const btn = e.target.closest('.spotify-import');
  if (!btn) return;
  e.preventDefault();
  const url = btn.dataset.setlistUrl;
  const openTool = ()=>window.open('https://setlistfm.selbi.club/','_blank');
  const ok = ()=>{ openTool(); const t=btn.textContent; btn.textContent='URL kopiert — einfügen'; setTimeout(()=>btn.textContent=t,3500); };
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(ok).catch(()=>{ openTool(); window.open(url,'_blank'); });
  else { openTool(); window.open(url,'_blank'); }
});
const totalSongs = DATA.concerts.reduce((a,c)=>a+c.setlist.length,0);
document.getElementById('songs-desc').textContent = DATA.songs.length+' verschiedene Songs · '+totalSongs+' Songs gesamt';
const max = DATA.songs[0].count;
document.getElementById('top-chart').innerHTML = DATA.songs.slice(0,12).map(s=>{
  const w = Math.round(s.count/max*100);
  return '<div class="chart-row"><div class="chart-label" data-song="'+esc(s.song)+'" role="button" tabindex="0">'+esc(s.song)+'</div><div class="chart-count">'+s.count+'</div><div class="chart-bar-wrap"><div class="chart-bar" style="width:'+w+'%"></div></div></div>';
}).join('');
document.getElementById('songs-body').innerHTML = DATA.songs.map((s,i)=>{
  const w = Math.round(s.count/max*100);
  const hint = s.count > 1 ? ' <span class="song-hint">('+s.count+'×)</span>' : '';
  return '<tr class="song-row" data-song="'+esc(s.song)+'"><td class="num">'+(i+1)+'</td><td class="song-name">'+renderSongListName(s.song)+hint+'</td><td class="cnt">'+s.count+'</td><td class="bar-cell"><div class="bar" style="width:'+w+'%"></div></td></tr>'+
    '<tr class="song-detail" hidden><td colspan="4">'+renderAppearances(s.concerts)+'</td></tr>';
}).join('');
document.getElementById('songs-body').addEventListener('click', e=>{
  if (e.target.closest('.song-official-link')) return;
  const link = e.target.closest('.concert-link');
  if (link) { e.stopPropagation(); openConcert(link.dataset.concert); return; }
  const row = e.target.closest('.song-row');
  if (row) toggleSongRow(row.dataset.song);
});
document.getElementById('top-chart').addEventListener('click', e=>{
  const el = e.target.closest('[data-song]');
  if (!el) return;
  const song = el.dataset.song;
  document.getElementById('songs').scrollIntoView({behavior:'smooth'});
  setTimeout(()=>toggleSongRow(song), 300);
});
document.getElementById('top-chart').addEventListener('keydown', e=>{
  if (e.key==='Enter' || e.key===' ') { const el=e.target.closest('[data-song]'); if(el){ e.preventDefault(); el.click(); } }
});
</script>
</body>
</html>
